name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 19 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o kk .

      - name: Binary smoke
        run: make test-smoke

  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Determine lint baseline
        id: lint-base
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_rev="${{ github.event.pull_request.base.sha }}"
          else
            base_rev="${{ github.event.before }}"
          fi
          if [ -z "${base_rev}" ] || [ "${base_rev}" = "0000000000000000000000000000000000000000" ]; then
            base_rev="$(git rev-list --max-parents=0 HEAD)"
          fi
          echo "base_rev=${base_rev}" >> "${GITHUB_OUTPUT}"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4.0
          args: --new-from-rev=${{ steps.lint-base.outputs.base_rev }}

  race-shuffle:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Download dependencies
        run: go mod download

      - name: Run shuffled tests
        run: go test -shuffle=on ./...

      - name: Run selected race tests
        run: go test -race ./cmd ./pkg/license ./pkg/templates ./pkg/compose ./pkg/validator
