name: Draft Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run tests
        run: go test -v ./...

      - name: Create changelog
        id: changelog
        run: |
          previous_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "${previous_tag}" ]; then
            git log --pretty=format:"- %s (%h)" "${previous_tag}..HEAD" > CHANGELOG.md
            compare_url="https://github.com/kkauto-net/kk-install/compare/${previous_tag}...${{ inputs.version }}"
          else
            git log --pretty=format:"- %s (%h)" HEAD > CHANGELOG.md
            compare_url="https://github.com/kkauto-net/kk-install/releases/tag/${{ inputs.version }}"
          fi
          if [ ! -s CHANGELOG.md ]; then
            printf '%s\n' '- No changes captured.' > CHANGELOG.md
          fi
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"
          echo "compare_url=${compare_url}" >> "$GITHUB_OUTPUT"
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          cat CHANGELOG.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Installation
            ```bash
            curl -sSL https://raw.githubusercontent.com/kkauto-net/kk-install/main/scripts/install.sh | bash
            ```

            ## Full Changelog
            **Full Changelog**: ${{ steps.changelog.outputs.compare_url }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
