name: cleanup-artifacts

# Auto-purge GitHub Actions artifacts older than 1 day to control storage usage.
# Runs daily at 02:00 UTC + manual dispatch with optional age override and dry-run mode.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Delete artifacts older than N days (default 1)'
        required: false
        default: '1'
      dry_run:
        description: 'Preview deletions without deleting artifacts'
        type: boolean
        required: false
        default: true

permissions:
  actions: write
  contents: read

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        env:
          MAX_AGE_DAYS: ${{ inputs.max_age_days || '1' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        with:
          script: |
            const rawMaxAgeDays = process.env.MAX_AGE_DAYS || '1';
            if (!/^[1-9]\d*$/.test(rawMaxAgeDays)) {
              core.setFailed(`Invalid max_age_days "${rawMaxAgeDays}". Expected integer between 1 and 365.`);
              return;
            }

            const maxAgeDays = Number(rawMaxAgeDays);
            if (maxAgeDays > 365) {
              core.setFailed(`Invalid max_age_days "${rawMaxAgeDays}". Expected integer between 1 and 365.`);
              return;
            }

            const dryRun = process.env.DRY_RUN === 'true';
            const cutoff = Date.now() - maxAgeDays * 24 * 60 * 60 * 1000;
            core.info(`${dryRun ? 'Previewing' : 'Purging'} artifacts older than ${maxAgeDays} day(s) - cutoff ${new Date(cutoff).toISOString()}`);

            let page = 1;
            let deleted = 0;
            let kept = 0;
            let bytesFreed = 0;
            const artifactsToDelete = [];

            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page,
              });
              if (data.artifacts.length === 0) break;

              for (const artifact of data.artifacts) {
                const createdAt = new Date(artifact.created_at).getTime();
                if (createdAt < cutoff) {
                  artifactsToDelete.push({ artifact, createdAt });
                } else {
                  kept++;
                }
              }
              if (data.artifacts.length < 100) break;
              page++;
            }

            for (const { artifact, createdAt } of artifactsToDelete) {
              const sizeBytes = artifact.size_in_bytes || 0;
              const ageDays = ((Date.now() - createdAt) / 86400000).toFixed(1);
              const sizeMb = (sizeBytes / 1024 / 1024).toFixed(2);

              if (dryRun) {
                core.info(`[dry-run] Would delete #${artifact.id} ${artifact.name} (age ${ageDays}d, ${sizeMb} MB)`);
                bytesFreed += sizeBytes;
                continue;
              }

              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                deleted++;
                bytesFreed += sizeBytes;
                core.info(`Deleted #${artifact.id} ${artifact.name} (age ${ageDays}d, ${sizeMb} MB)`);
              } catch (err) {
                core.warning(`Failed #${artifact.id}: ${err.message}`);
              }
            }

            const selected = artifactsToDelete.length;
            core.notice(`Done - ${dryRun ? 'would delete' : 'deleted'} ${dryRun ? selected : deleted}, kept ${kept}, ${dryRun ? 'would free' : 'freed'} ${(bytesFreed / 1024 / 1024).toFixed(2)} MB`);
            await core.summary
              .addHeading('Artifact cleanup summary')
              .addTable([
                [{ data: 'Metric', header: true }, { data: 'Value', header: true }],
                ['Dry run', String(dryRun)],
                ['Max age (days)', String(maxAgeDays)],
                ['Selected', String(selected)],
                ['Deleted', String(dryRun ? 0 : deleted)],
                ['Kept', String(kept)],
                [dryRun ? 'Would free (MB)' : 'Freed (MB)', (bytesFreed / 1024 / 1024).toFixed(2)],
              ])
              .write();
